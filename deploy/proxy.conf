# Apache reverse-proxy for meta.greenparkgroup.cloud (cPanel userdata include).
# Copy this to BOTH:
#   /etc/apache2/conf.d/userdata/std/2_4/greenparkgroup/meta.greenparkgroup.cloud/proxy.conf
#   /etc/apache2/conf.d/userdata/ssl/2_4/greenparkgroup/meta.greenparkgroup.cloud/proxy.conf
# then:  /scripts/ensure_vhost_includes --user=greenparkgroup && apachectl graceful
#
# Order matters: the most specific path (/api/meta) must come BEFORE /api.
#   /api/meta -> metaapi (meta-be :8098)  — Ads/WhatsApp/Instagram + DM inbox
#   /api      -> marketing backend :8086  — login + work items (unified auth)
#   /         -> marketing frontend :8093 — the SPA (already has the Meta tabs)
ProxyPass /.well-known !
ProxyPass /api/meta http://127.0.0.1:8098/api/meta
ProxyPassReverse /api/meta http://127.0.0.1:8098/api/meta
ProxyPass /api http://127.0.0.1:8086/api
ProxyPassReverse /api http://127.0.0.1:8086/api
ProxyPass / http://127.0.0.1:8093/
ProxyPassReverse / http://127.0.0.1:8093/
